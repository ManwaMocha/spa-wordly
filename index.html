<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>📖 Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="searchForm">
        <input
            type="text"
            id="wordInput"
            placeholder="Enter a word..."
            required
        >

        <button type="submit">Search</button>
    </form>

    <!-- Search Results -->
    <div id="result"></div>

    <hr>

    <h2>⭐ Saved Words</h2>

    <ul id="savedWords"></ul>

    <script src="script.js"></script>

</body>
</html>
